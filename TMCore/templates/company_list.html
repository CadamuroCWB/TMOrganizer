{% extends 'base.html' %}
{% block content %}
<h1>{{ title }}</h1>
<a href="{% url 'company_create' %}" class="btn btn-primary">Nova Empresa</a>
<table class="table">
    <thead>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>CNPJ</th>
            <th>Alias</th>
            <th>Telefone</th>
            <th>Email</th>
            <th>Ações</th>
        </tr>
    </thead>
    <tbody>
        {% for c in companies %}
        <tr>
            <td>{{ c.id }}</td>
            <td>{{ c.name }}</td>
            <td>{{ c.cnpj }}</td>
            <td>{{ c.alias }}</td>
            <td>{{ c.phone }}</td>
            <td>{{ c.email }}</td>
            <td>
                <a href="{% url 'company_update' c.id %}" class="btn btn-sm btn-warning">Editar</a>
                <a href="{% url 'company_delete' c.id %}" class="btn btn-sm btn-danger">Excluir</a>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="7">Nenhuma empresa cadastrada.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
