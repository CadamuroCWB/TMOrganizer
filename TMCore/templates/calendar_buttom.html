
    <div class="btn-group mb-3"  style="text-align: left;">
        <button type="button" class="btn btn-outline-secondary" onclick="goToToday()">
            <svg id="todayIcon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-calendar" viewBox="0 0 16 16">
                <path d="M3.5 0a.5.5 0 0 1 .5.5V1h8V.5a.5.5 0 0 1 1 0V1h1a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V3a2 2 0 0 1 2-2h1V.5a.5.5 0 0 1 .5-.5zM1 4v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4H1z"/>
            </svg>
            <span id="todayButton">Hoje</span>
        </button>
    </div>
    <div class="btn-group mb-3" style="text-align: center;">
        <button type="button" class="btn btn-outline-secondary" onclick="decreaseWeek()">
            <svg id="arrowLeft" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-left-short" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M12 8a.5.5 0 0 1-.5.5H5.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L5.707 7.5H11.5a.5.5 0 0 1 .5.5"/>
            </svg>
            <span class="visually-hidden">Button</span>
        </button>
        <button type="button" class="btn btn-outline-secondary">
            <span id="weekButton">Semana</span>
        </button>
        <button type="button mb-3" class="btn btn-outline-secondary" onclick="addWeek()">
            <svg id="arrowRight" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-right-short" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M4 8a.5.5 0 0 1 .5-.5h5.793L8.146 5.354a.5.5 0 1 1 .708-.708l3 3a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708-.708L10.293 8.5H4.5A.5.5 0 0 1 4 8"/>
            </svg>
            <span class="visually-hidden">Button</span>
        </button>
    </div>
    <div class="btn-group mb-3" style="text-align: right;">
        <button type="button" class="btn btn-outline-secondary">
            <span id="monthButton">Mês</span>
        </button>
        <button type="button" class="btn btn-outline-secondary">
            <span id="yearButton">Ano</span>
        </button>
    </div>
