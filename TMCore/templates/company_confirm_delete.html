{% extends 'base.html' %}
{% block content %}
<h1>{{ title }}</h1>
<p>Tem certeza que deseja excluir a empresa <strong>{{ object.name }}</strong>?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Sim, excluir</button>
    <a href="{% url 'company_list' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
